x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET}
  AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW_API_AUTH_JWT_ISSUER}

x-airflow-common-volumes: &airflow-common-volumes
  - ./dags:/opt/airflow/dags
  - ./logs:/opt/airflow/logs
  - ./plugins:/opt/airflow/plugins
  - ./uploads:/opt/airflow/uploads

services:
  postgres:
    image: postgres:17-alpine
    container_name: insightops_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-postgres:
    image: postgres:17-alpine
    container_name: insightops_airflow_postgres
    restart: always
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: ${AIRFLOW_IMAGE_NAME}
    container_name: insightops_airflow_init
    depends_on:
      - airflow-postgres
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    user: "${AIRFLOW_UID}:0"
    volumes: *airflow-common-volumes
    command: version

  airflow-webserver:
    image: ${AIRFLOW_IMAGE_NAME}
    container_name: insightops_airflow_webserver
    restart: always
    depends_on:
      - airflow-init
      - airflow-postgres
    environment:
      <<: *airflow-common-env
    user: "${AIRFLOW_UID}:0"
    ports:
      - "8080:8080"
    volumes: *airflow-common-volumes
    command: api-server

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE_NAME}
    container_name: insightops_airflow_scheduler
    restart: always
    depends_on:
      - airflow-init
      - airflow-postgres
    environment:
      <<: *airflow-common-env
    user: "${AIRFLOW_UID}:0"
    volumes: *airflow-common-volumes
    command: scheduler

  airflow-dag-processor:
    image: ${AIRFLOW_IMAGE_NAME}
    container_name: insightops_airflow_dag_processor
    restart: always
    depends_on:
      - airflow-init
      - airflow-postgres
    environment:
      <<: *airflow-common-env
    user: "${AIRFLOW_UID}:0"
    volumes: *airflow-common-volumes
    command: dag-processor

volumes:
  postgres_data:
  airflow_postgres_data: